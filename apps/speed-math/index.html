<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Speed Math ⚡</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
  <script src="logic.js"></script>
</head>
<body>
<div x-data="gameApp()" x-cloak>

  <!-- ══════════════════════════════════════════════
       SCREEN: Name Entry
  ══════════════════════════════════════════════ -->
  <div
    x-show="screen === 'name-entry'"
    x-transition:enter="transition ease-out duration-300"
    x-transition:enter-start="opacity-0 translate-y-4"
    x-transition:enter-end="opacity-100 translate-y-0"
    class="screen"
  >
    <div class="w-full max-w-xs">

      <!-- Logo -->
      <div class="mb-10">
        <div class="text-7xl mb-3 select-none">⚡</div>
        <h1 class="text-4xl font-black tracking-tight">Speed Math</h1>
        <p class="mt-2 text-sm" style="color:var(--muted)">Tables 11–20 · up to ×10 · 60 seconds</p>
      </div>

      <!-- Form -->
      <div class="space-y-3">
        <input
          x-model="nameInput"
          @keydown.enter="startGame"
          type="text"
          class="name-input"
          placeholder="Your name…"
          maxlength="20"
          autocomplete="off"
          autofocus
        />
        <button @click="startGame" class="btn-p">Let's Go! ⚡</button>
      </div>

      <!-- Link to leaderboard if players exist -->
      <template x-if="leaderboard.length > 0">
        <button
          @click="viewLeaderboard"
          class="mt-8 text-sm underline underline-offset-2 transition-colors"
          style="color:var(--muted)"
        >
          View leaderboard (<span x-text="leaderboard.length"></span> player<span x-show="leaderboard.length !== 1">s</span>)
        </button>
      </template>

    </div>
  </div>

  <!-- ══════════════════════════════════════════════
       SCREEN: Countdown
  ══════════════════════════════════════════════ -->
  <div
    x-show="screen === 'countdown'"
    x-transition:enter="transition ease-out duration-200"
    x-transition:enter-start="opacity-0"
    x-transition:enter-end="opacity-100"
    class="screen"
  >
    <p class="text-lg mb-10" style="color:var(--muted)">
      Get ready, <span class="font-bold" style="color:var(--text)" x-text="playerName"></span>!
    </p>
    <div
      x-ref="countEl"
      class="text-[9rem] sm:text-[11rem] font-black leading-none select-none"
      x-text="countdownDisplay"
      :style="countdownValue === 0 ? 'color:#f59e0b' : 'color:#fff'"
    ></div>
  </div>

  <!-- ══════════════════════════════════════════════
       SCREEN: Playing
  ══════════════════════════════════════════════ -->
  <div
    x-show="screen === 'playing'"
    x-transition:enter="transition ease-out duration-200"
    x-transition:enter-start="opacity-0"
    x-transition:enter-end="opacity-100"
    class="screen-play"
  >

    <!-- Top bar -->
    <div class="flex items-center justify-between mb-2 px-1">
      <span class="text-sm font-semibold" style="color:var(--muted)" x-text="playerName"></span>
      <span class="text-sm" style="color:var(--muted)">×1 to ×10</span>
    </div>

    <!-- Question -->
    <div class="flex-1 flex items-center justify-center py-2">
      <template x-if="currentQ">
        <div class="text-center select-none">
          <p class="text-xs font-semibold tracking-widest uppercase mb-3" style="color:var(--muted)">What is</p>
          <p class="font-black leading-none" style="font-size: clamp(3.5rem, 15vw, 5.5rem)"
             x-text="`${currentQ.a} × ${currentQ.b}`"></p>
          <p class="font-black mt-1" style="font-size: clamp(2.5rem, 10vw, 4rem); color:var(--purple-lt)">?</p>
        </div>
      </template>
    </div>

    <!-- Options 2 × 2 -->
    <template x-if="currentQ">
      <div class="grid grid-cols-2 gap-3 mb-4">
        <template x-for="(opt, i) in options" :key="opt">
          <button
            class="option-btn"
            :class="['opt-' + i, optionClass(opt)]"
            :disabled="locked"
            @click="selectOption(opt)"
            x-text="opt"
          ></button>
        </template>
      </div>
    </template>

    <!-- Bottom bar: timer + score -->
    <div>
      <!-- Timer row -->
      <div class="flex items-center gap-3 mb-2">
        <span
          class="text-2xl font-black w-12 text-right tabular-nums flex-shrink-0"
          :class="timerUrgent ? 'timer-urgent' : ''"
          :style="{ color: timerColor }"
          x-text="timeLeft + 's'"
        ></span>
        <div class="flex-1 h-3 rounded-full overflow-hidden" style="background:var(--surface2)">
          <div
            class="timer-fill"
            :style="{ width: timerPercent + '%', background: timerColor }"
          ></div>
        </div>
      </div>

      <!-- Score row -->
      <div class="flex items-center justify-between px-1">
        <span class="text-sm font-medium" style="color:var(--muted)">Score</span>
        <span class="text-2xl font-black tabular-nums" x-text="score"></span>
      </div>
    </div>

  </div>

  <!-- ══════════════════════════════════════════════
       SCREEN: Score Reveal
  ══════════════════════════════════════════════ -->
  <div
    x-show="screen === 'score-reveal'"
    x-transition:enter="transition ease-out duration-300"
    x-transition:enter-start="opacity-0"
    x-transition:enter-end="opacity-100"
    class="screen"
  >
    <div class="w-full max-w-xs">

      <div class="r1 text-6xl mb-5 select-none">⏱️</div>
      <h2 class="r2 text-2xl font-bold mb-1" style="color:var(--muted)">Time's up!</h2>
      <p  class="r3 text-3xl font-black" x-text="playerName"></p>
      <p  class="r3 text-base mt-1 mb-4" style="color:var(--muted)">you scored</p>

      <div class="r4 font-black tabular-nums" style="font-size:6rem; line-height:1; color:var(--gold)" x-text="score"></div>
      <p class="r4 mt-2 mb-10" style="color:var(--muted)">
        correct answer<span x-show="score !== 1">s</span>
      </p>

      <div class="r5 space-y-3">
        <button @click="viewLeaderboard" class="btn-p">See Leaderboard 🏆</button>
        <button @click="addPlayer"       class="btn-s">Add Another Player ➕</button>
      </div>

    </div>
  </div>

  <!-- ══════════════════════════════════════════════
       SCREEN: Leaderboard
  ══════════════════════════════════════════════ -->
  <div
    x-show="screen === 'leaderboard'"
    x-transition:enter="transition ease-out duration-300"
    x-transition:enter-start="opacity-0 translate-y-4"
    x-transition:enter-end="opacity-100 translate-y-0"
    class="screen"
  >
    <div class="w-full max-w-xs">

      <!-- Header -->
      <div class="mb-7">
        <div class="text-5xl mb-3 select-none">🏆</div>
        <h2 class="text-3xl font-black">Leaderboard</h2>
        <p class="text-sm mt-1" style="color:var(--muted)">
          <span x-text="leaderboard.length"></span>
          player<span x-show="leaderboard.length !== 1">s</span>
        </p>
      </div>

      <!-- Player rows -->
      <div class="lb-scroll w-full mb-7 space-y-2">
        <template x-for="(entry, i) in sortedBoard" :key="i">
          <div
            class="lb-row flex items-center gap-3 rounded-2xl px-4 py-3 border"
            :style="i === 0
              ? 'background:rgba(245,158,11,0.1); border-color:rgba(245,158,11,0.35)'
              : 'background:var(--surface); border-color:var(--border)'"
          >
            <span class="text-xl w-7 flex-shrink-0 select-none" x-text="rankIcon(i)"></span>
            <span class="flex-1 font-semibold text-left truncate" x-text="entry.name"></span>
            <span
              class="text-xl font-black tabular-nums"
              :style="i === 0 ? 'color:var(--gold)' : 'color:var(--text)'"
              x-text="entry.score"
            ></span>
          </div>
        </template>
      </div>

      <!-- Actions -->
      <div x-show="!sessionEnded" class="space-y-3">
        <button @click="addPlayer"   class="btn-p">Add Player ➕</button>
        <button @click="endSession"  class="btn-s">End Game</button>
      </div>
      <div x-show="sessionEnded" class="space-y-3">
        <button @click="newGame" class="btn-p">Play Again 🔄</button>
      </div>

    </div>
  </div>

</div>
</body>
</html>
