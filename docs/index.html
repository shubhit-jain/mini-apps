<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mini Apps</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Inter', sans-serif; }
    .card:hover .arrow { transform: translateX(4px); }
    .arrow { transition: transform 0.2s ease; }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-50 to-indigo-50">

  <div class="max-w-3xl mx-auto px-6 py-16">

    <div class="mb-12">
      <h1 class="text-4xl font-bold text-slate-800 mb-2">Mini Apps</h1>
      <p class="text-slate-500 text-lg">A growing collection of fun little tools.</p>
    </div>

    <div class="grid gap-4 sm:grid-cols-2">
      
      <a href="apps/minecraft/" class="card group flex items-start gap-4 bg-white rounded-2xl p-5 shadow-sm border border-slate-100 hover:shadow-md hover:border-indigo-200 transition-all duration-200">
        <div class="text-3xl leading-none mt-0.5">⛏️</div>
        <div class="flex-1 min-w-0">
          <div class="flex items-center justify-between gap-2">
            <h2 class="font-semibold text-slate-800 text-base truncate">Minecraft Adventure</h2>
            <span class="arrow text-slate-300 text-lg flex-shrink-0">→</span>
          </div>
          <p class="text-sm text-slate-400 mt-0.5 line-clamp-2">Mine blocks, collect diamonds, dodge Creepers!</p>
        </div>
      </a>
      <a href="apps/speed-math/" class="card group flex items-start gap-4 bg-white rounded-2xl p-5 shadow-sm border border-slate-100 hover:shadow-md hover:border-indigo-200 transition-all duration-200">
        <div class="text-3xl leading-none mt-0.5">⚡</div>
        <div class="flex-1 min-w-0">
          <div class="flex items-center justify-between gap-2">
            <h2 class="font-semibold text-slate-800 text-base truncate">Speed Math</h2>
            <span class="arrow text-slate-300 text-lg flex-shrink-0">→</span>
          </div>
          <p class="text-sm text-slate-400 mt-0.5 line-clamp-2">Race the clock on tables 11–20. Who scores the most in 60 seconds?</p>
        </div>
      </a>
    </div>

  </div>

</body>
</html>
